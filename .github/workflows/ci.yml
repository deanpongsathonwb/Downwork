name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend ────────────────────────────────────────────────
  test-client:
    name: Test Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Lint
        run: npx eslint . --max-warnings 0

      - name: Unit tests
        run: npm test -- --reporter=verbose

      - name: Production build
        run: npm run build:prod

  # ── Backend ─────────────────────────────────────────────────
  test-server:
    name: Test Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npx nest build

      - name: Unit tests
        run: npx jest --passWithNoTests --forceExit

  lint-server:
    name: Lint Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: ESLint
        run: npx eslint "src/**/*.ts" --max-warnings 0

  # ── Security ────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Audit client
        working-directory: client
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Audit server
        working-directory: server
        run: npm audit --audit-level=high
        continue-on-error: true

  # ── Deploy placeholder ──────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test-client, test-server, lint-server]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy placeholder
        run: echo "Deploy step — configure with your hosting provider (Railway, Fly.io, AWS, etc.)"
