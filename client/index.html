<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Default tab title only until Vue runs; avoid flashing the home marketing title on every refresh. -->
    <title>%VITE_APP_NAME%</title>
    <script>
      ;(function () {
        var brand = '%VITE_APP_NAME%'
        var path = (location.pathname || '/').replace(/\/*$/, '') || '/'
        if (path === '/') {
          document.title = brand + ' | Hire Top Freelance Talent with Confidence'
          return
        }
        if (path === '/search/jobs') {
          document.title = 'Search Freelance Jobs on ' + brand
          return
        }
        if (path === '/search/talent') {
          document.title = 'Search Freelance Talent on ' + brand
          return
        }
      })()
    </script>

    <!-- SEO -->
    <meta name="description" content="Downwork connects businesses with top freelancers worldwide. Post jobs, hire talent, and manage projects — all in one platform." />
    <meta name="keywords" content="freelance, marketplace, hire freelancers, remote work, jobs" />
    <meta name="author" content="Downwork" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://downwork.com" />

    <!-- Open Graph / Facebook / LINE -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://downwork.com" />
    <meta property="og:title" content="Downwork | Hire Top Freelance Talent with Confidence" />
    <meta property="og:description" content="Downwork connects businesses with top freelancers worldwide. Post jobs, hire talent, and manage projects." />
    <meta property="og:image" content="https://downwork.com/og-image.png" />
    <meta property="og:site_name" content="Downwork" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Downwork | Hire Top Freelance Talent with Confidence" />
    <meta name="twitter:description" content="Downwork connects businesses with top freelancers worldwide. Post jobs, hire talent, and manage projects." />
    <meta name="twitter:image" content="https://downwork.com/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Theme -->
    <meta name="theme-color" content="#16a34a" />
    <meta name="msapplication-TileColor" content="#16a34a" />
  </head>
  <body>
    <div id="app"></div>
    <noscript>
      <div style="display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:system-ui,sans-serif;text-align:center;padding:2rem;">
        <div>
          <h1 style="font-size:1.5rem;margin-bottom:0.5rem;">JavaScript Required</h1>
          <p style="color:#64748b;">Please enable JavaScript to use Downwork.</p>
        </div>
      </div>
    </noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
